<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    body { 
      font-family: Arial, sans-serif; 
      margin: 20px; 
      line-height: 1.6;
    }
    h2 { color: #1a73e8; margin-top: 0; }
    label { 
      font-weight: bold; 
      display: block; 
      margin: 18px 0 8px 0; 
      color: #333;
    }
    textarea { 
      width: 100%; 
      height: 160px; 
      font-family: monospace; 
      padding: 10px; 
      border: 1px solid #ccc; 
      border-radius: 6px;
      box-sizing: border-box;
    }
    button { 
      padding: 12px 24px; 
      font-size: 16px; 
      background: #1a73e8; 
      color: white; 
      border: none; 
      border-radius: 6px; 
      cursor: pointer;
      margin-top: 20px;
    }
    button:hover { background: #1557b0; }
    .note {
      font-size: 0.9em;
      color: #666;
      margin-top: 5px;
    }
  </style>
</head>
<body>

<h2>Edit Cadre</h2>

<label>S3 Leadership (Column A)</label>
<textarea id="s3" placeholder="Enter S3 Leadership members, one per line"></textarea>

<label>Drill Sergeants - DS (Column B)</label>
<textarea id="ds" placeholder="Enter Drill Sergeants, one per line"></textarea>

<label>Drill Instructors - DI (Column C)</label>
<textarea id="di" placeholder="Enter Drill Instructors, one per line"></textarea>

<label>Range Safety Officers - RSO (Column D)</label>
<textarea id="rso" placeholder="Enter Range Safety Officers, one per line"></textarea>

<div class="note">Tip: One name per line. Empty lines will be ignored.</div>

<button onclick="saveCadre()">Save Cadre</button>

<script>
function loadCadre() {
  google.script.run
    .withSuccessHandler(data => {
      document.getElementById("s3").value = (data.s3 || []).join("\n");
      document.getElementById("ds").value = (data.ds || []).join("\n");
      document.getElementById("di").value = (data.di || []).join("\n");
      document.getElementById("rso").value = (data.rso || []).join("\n");
    })
    .withFailureHandler(err => console.error(err))
    .getCadreData();
}

function saveCadre() {
  const data = {
    s3:  document.getElementById("s3").value.split("\n").map(x => x.trim()).filter(x => x),
    ds:  document.getElementById("ds").value.split("\n").map(x => x.trim()).filter(x => x),
    di:  document.getElementById("di").value.split("\n").map(x => x.trim()).filter(x => x),
    rso: document.getElementById("rso").value.split("\n").map(x => x.trim()).filter(x => x)
  };

  google.script.run
    .withSuccessHandler(() => {
      alert("✅ Cadre saved successfully!");
      google.script.host.close();
    })
    .withFailureHandler(err => {
      alert("Error saving cadre:\n" + err.message);
    })
    .saveCadreData(data);
}

window.onload = loadCadre;
</script>

</body>
</html>
