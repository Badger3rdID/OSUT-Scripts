<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    h2 { color: #1a73e8; }
    .event-row { margin-bottom: 20px; }
    label { font-weight: bold; display: block; margin-bottom: 5px; }
    textarea { 
      width: 100%; 
      height: 110px; 
      font-family: monospace; 
      padding: 10px; 
      box-sizing: border-box;
    }
    button { 
      padding: 14px 28px; 
      font-size: 16px; 
      background: #1a73e8; 
      color: white; 
      border: none; 
      border-radius: 6px; 
      cursor: pointer;
      margin-top: 15px;
    }
    button:hover { background: #1557b0; }
  </style>
</head>
<body>
  <h2>Edit Range Instructions</h2>
  <div id="instructionsContainer"></div>
  <button onclick="saveInstructions()">Save All Instructions</button>

<script>
const events = ["XM7", "M320", "M17", "Obstacle Course", "Grenade", "AT-4", "M250", "IET"];

function loadInstructions() {
  google.script.run
    .withSuccessHandler(data => {
      const container = document.getElementById("instructionsContainer");
      let html = "";

      events.forEach((eventName, i) => {
        const savedText = data[i] ? data[i].instructions : "";
        html += `
          <div class="event-row">
            <label>${eventName}</label>
            <textarea id="inst_${i}" placeholder="Enter range instructions, safety notes, or grading criteria for ${eventName}...">${savedText}</textarea>
          </div>`;
      });

      container.innerHTML = html;
    })
    .getRangeInstructions();
}

function saveInstructions() {
  const data = [];
  for (let i = 0; i < events.length; i++) {
    const text = document.getElementById(`inst_${i}`).value.trim();
    data.push({ event: events[i], instructions: text });
  }

  google.script.run
    .withSuccessHandler(() => {
      alert("✅ Range instructions saved successfully!");
      google.script.host.close();
    })
    .withFailureHandler(err => alert("Error saving: " + err.message))
    .saveRangeInstructions(data);
}

window.onload = loadInstructions;
</script>
</body>
</html>
